name: BCD-FSS Backend Build and Deploy CI/CD

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main, development ]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/postgres?schema=public
      DIRECT_URL: postgresql://postgres:postgrespassword@localhost:5432/postgres?schema=public
    
    strategy:
      matrix:
        node-version: [20.x]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Run Dependency Vulnerabilities Scan
        run: |
          cd backend
          npm audit --audit-level=high || true

      - name: Generate Prisma Client
        run: |
          cd backend
          npx prisma generate

      - name: Wait for PostgreSQL
        run: npx wait-on tcp:localhost:5432 --timeout 60000

      - name: Run Database Migrations
        run: |
          cd backend
          npx prisma db push

      - name: Run Core Test Suite
        env:
          REDIS_ENABLED: true
          REDIS_URL: redis://localhost:6379
          SUPABASE_URL: https://mockproject.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: mockservicewithsignkeyrole
          JWT_SECRET: testingjwtsecretmustbelongerthenusual
        run: |
          cd backend
          npm run test

  build-docker-image:
    needs: test-and-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Production Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: bcd-fss-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
