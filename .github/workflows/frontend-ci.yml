name: Frontend CI/CD

on:
  push:
    branches: [main, development]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, development]
    paths:
      - 'frontend/**'

defaults:
  run:
    working-directory: frontend

jobs:
  # ──────────────────────────────────────────
  # Job 1: Install, Lint & Format
  # ──────────────────────────────────────────
  lint:
    name: Install & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

  # ──────────────────────────────────────────
  # Job 2: Unit Tests
  # ──────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm test

  # ──────────────────────────────────────────
  # Job 3: Production Build
  # ──────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:5000' }}
          NODE_ENV: production

      - name: Verify dist folder
        run: |
          ls -lh dist/
          test -f dist/index.html

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ──────────────────────────────────────────
  # Job 4: Docker Build
  # ──────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bcd-fss-frontend:latest .
        working-directory: frontend

      - name: Run Docker container (health check)
        run: |
          docker run -d --name fss-frontend -p 8080:80 bcd-fss-frontend:latest
          sleep 5
          curl -f http://localhost:8080/ || exit 1
          docker stop fss-frontend
          docker rm fss-frontend

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/postgres?schema=public
      DIRECT_URL: postgresql://postgres:postgrespassword@localhost:5432/postgres?schema=public
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js (Backend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies & generate Prisma client
        run: |
          cd backend
          npm ci
          npx prisma generate
          npx prisma db push
          npm run seed

      - name: Start Backend Server
        run: |
          cd backend
          npm start &
        env:
          REDIS_ENABLED: true
          REDIS_URL: redis://localhost:6379
          SUPABASE_URL: https://mockproject.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: mockservicewithsignkeyrole
          JWT_SECRET: testingjwtsecretmustbelongerthenusual

      - name: Wait for Backend Server
        run: npx wait-on http://localhost:5000 --timeout 60000

      - name: Setup Node.js (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps

      - name: Start dev server in background
        run: |
          cd frontend
          npm run dev &
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:5000' }}

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Cypress E2E tests
        run: |
          cd frontend
          npm run cypress:run
        env:
          CYPRESS_TEST_ADMIN_EMAIL: ${{ secrets.CYPRESS_ADMIN_EMAIL || 'ankita.agarwal@mitconindia.com' }}
          CYPRESS_TEST_ADMIN_PASSWORD: ${{ secrets.CYPRESS_ADMIN_PASSWORD || 'Ankita0207@10841' }}

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
